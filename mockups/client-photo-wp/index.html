<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
  <title>WP: фото клиента</title>
  <style>
    :root {
      --bg: #eef1f5;
      --panel: #ffffff;
      --line: #d9e1ec;
      --text: #1f3552;
      --muted: #6f7d91;
      --active: #151a22;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
    }
    .app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      background: var(--panel);
    }
    .head {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
    }
    .title {
      margin: 0 0 10px;
      font-size: 17px;
      font-weight: 800;
      line-height: 1.2;
    }
    .subtitle {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      background: #e9edf3;
      color: #2f3a4b;
      font: 700 14px "Segoe UI", Arial, sans-serif;
      white-space: nowrap;
      cursor: pointer;
    }
    .tab.active {
      background: var(--active);
      color: #fff;
    }
    .frame-wrap {
      position: relative;
      min-height: 0;
    }
    .screen {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
      background: #fff;
    }
    .screen.active { display: block; }
  </style>
</head>
<body>
  <div class="app">
    <header class="head">
      <h1 class="title">Проверка фото клиента с WP</h1>
      <p class="subtitle">Два экрана в одном проекте: мобильный сценарий с welcome-pack и витрина проверки фото в SFAD.</p>
      <div class="tabs">
        <button class="tab active" type="button" data-tab="wp-onboarding">Онбординг с welcome-pack</button>
        <button class="tab" type="button" data-tab="sfad-verification">Витрина SFAD</button>
      </div>
    </header>
    <main class="frame-wrap">
      <iframe class="screen active" data-screen="wp-onboarding" src="./welcome-pack-photo-check.html" title="Онбординг с welcome-pack"></iframe>
      <iframe class="screen" data-screen="sfad-verification" src="./sfad-photo-verification.html" title="Витрина SFAD"></iframe>
    </main>
  </div>

  <script>
    const tabs = Array.from(document.querySelectorAll("[data-tab]"));
    const screens = Array.from(document.querySelectorAll("[data-screen]"));
    const defaultTab = "wp-onboarding";

    function notifyTabChange(id) {
      const payload = { type: "mockup-tab-change", projectId: "client-photo-wp", tab: id };
      try { window.parent.postMessage(payload, "*"); } catch {}
      try { window.top.postMessage(payload, "*"); } catch {}
    }

    function setTabInUrl(id) {
      try {
        const url = new URL(location.href);
        url.searchParams.set("tab", id);
        history.replaceState(null, "", url.toString());
      } catch {}
    }

    function activate(id, options = {}) {
      const exists = tabs.some((tab) => tab.dataset.tab === id);
      const nextId = exists ? id : defaultTab;
      const shouldSyncUrl = options.syncUrl !== false;

      tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.tab === nextId));
      screens.forEach((screen) => screen.classList.toggle("active", screen.dataset.screen === nextId));

      if (shouldSyncUrl) setTabInUrl(nextId);
      notifyTabChange(nextId);
    }

    tabs.forEach((tab) => tab.addEventListener("click", () => activate(tab.dataset.tab)));

    const initialTab = new URL(location.href).searchParams.get("tab") || defaultTab;
    activate(initialTab, { syncUrl: true });
  </script>
  <script src="../_shared/feedback-widget.js"></script>
</body>
</html>
