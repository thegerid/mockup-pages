<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
  <title>Новая эра ЛЦ - Снабжение неименными картами</title>
  <style>
    :root {
      --bg: #e6e7ea;
      --surface: #f8f8f9;
      --panel: #f1f2f4;
      --line: #d3d5db;
      --line-strong: #b7bbc5;
      --text: #1d2028;
      --muted: #6f7481;
      --accent: #da3c34;
      --accent-soft: #fbe2df;
      --success: #1db454;
      --shadow: 0 5px 16px rgba(17, 20, 27, 0.14);
      --radius-m: 10px;
      --radius-l: 14px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100%;
      background: linear-gradient(180deg, #ebebed 0%, var(--bg) 100%);
      color: var(--text);
      font: 500 16px/1.35 "Segoe UI", Arial, sans-serif;
    }

    .app {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 14px;
      padding: 12px 10px 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 4px 0 8px;
      border-bottom: 1px solid var(--line);
    }

    .title {
      margin: 0;
      font-size: clamp(24px, 2.1vw, 34px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }

    .profile {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      min-height: 46px;
    }

    .profile-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 4px solid var(--success);
      background: #e6f8ed;
    }

    .profile-name {
      padding: 0 18px;
      border-inline: 1px solid var(--line);
      font-weight: 600;
      white-space: nowrap;
    }

    .profile-icon {
      width: 24px;
      height: 24px;
      border: 0;
      background: transparent;
      color: #8a8f9a;
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
      padding: 0;
    }

    .filter-panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-l);
      box-shadow: var(--shadow);
      padding: 12px 12px 10px;
      display: grid;
      gap: 10px;
    }

    .primary-filters {
      display: grid;
      grid-template-columns: minmax(180px, 240px) minmax(180px, 240px) auto;
      gap: 10px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 4px;
      position: relative;
    }

    .field-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .filter-trigger {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius-m);
      padding: 0 12px;
      background: #e4e5e9;
      color: #2f3341;
      font: 500 16px/1.2 "Segoe UI", Arial, sans-serif;
      outline: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
    }

    .filter-trigger:focus {
      border-color: #8a92a2;
      box-shadow: 0 0 0 3px rgba(138, 146, 162, 0.15);
    }

    .filter-trigger .caption {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
      flex: 1;
    }

    .filter-trigger .caret {
      color: #6e7686;
      font-size: 11px;
      line-height: 1;
    }

    .field.open .filter-trigger {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      border-color: #8a92a2;
    }

    .filter-dropdown {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% - 1px);
      z-index: 35;
      border: 1px solid #8a92a2;
      border-top: 0;
      border-radius: 0 0 var(--radius-m) var(--radius-m);
      background: #eceef2;
      box-shadow: 0 10px 18px rgba(24, 28, 38, 0.14);
      max-height: 220px;
      overflow: auto;
      display: none;
    }

    .field.open .filter-dropdown {
      display: block;
    }

    .filter-option {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 10px;
      color: #2a2f3b;
      font-size: 13px;
      line-height: 1.2;
      cursor: pointer;
      user-select: none;
    }

    .filter-option:hover {
      background: #e3e7ef;
    }

    .filter-option input {
      width: 14px;
      height: 14px;
      margin: 0;
      accent-color: #1f2129;
      flex: 0 0 auto;
    }

    .city-dropdown {
      padding: 10px 10px 8px;
    }

    .city-scope {
      display: inline-flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .city-scope-btn {
      height: 30px;
      border: 0;
      border-radius: 999px;
      padding: 0 14px;
      background: #d9dde5;
      color: #2f3341;
      font: 700 15px/1 "Segoe UI", Arial, sans-serif;
      cursor: pointer;
    }

    .city-scope-btn.active {
      background: #1f2129;
      color: #fff;
    }

    .city-hint {
      color: #666d7b;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .city-search {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      border: 2px solid #a0a5b1;
      border-radius: 9px;
      background: #f4f5f8;
      padding: 0 10px;
      margin-bottom: 8px;
    }

    .city-search-icon {
      color: #838a99;
      font-size: 20px;
      line-height: 1;
    }

    .city-search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: #2a2f3b;
      font: 500 16px/1.2 "Segoe UI", Arial, sans-serif;
    }

    .city-search input::placeholder {
      color: #959caa;
    }

    .city-options {
      max-height: 130px;
      overflow: auto;
      margin: 2px 0 10px;
      padding-right: 2px;
    }

    .city-empty {
      min-height: 56px;
      display: grid;
      place-items: center;
      color: #9da3b0;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
    }

    .city-reset {
      height: 30px;
      border: 0;
      border-radius: 9px;
      padding: 0 18px;
      background: #d9dde5;
      color: #8d95a4;
      font: 700 15px/1 "Segoe UI", Arial, sans-serif;
      cursor: pointer;
    }

    .city-reset:disabled {
      opacity: 0.8;
      cursor: default;
    }

    .filter-empty {
      padding: 10px;
      color: #7f8798;
      font-size: 12px;
    }

    .field.disabled .filter-trigger {
      background: #eceef2;
      color: #9ca2ae;
      border-color: #dde0e7;
      cursor: not-allowed;
    }

    .field.disabled .caret {
      color: #afb4bf;
    }

    .generate-btn {
      height: 42px;
      border: 0;
      border-radius: var(--radius-m);
      padding: 0 10px;
      justify-self: start;
      background: #1f2129;
      color: #fff;
      font: 700 12px/1 "Segoe UI", Arial, sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: 140ms ease;
    }

    .generate-btn:hover { filter: brightness(0.98); }
    .generate-btn:active { transform: translateY(1px); }
    .generate-btn:disabled {
      background: #babec8;
      color: #f4f5f7;
      cursor: not-allowed;
      filter: none;
    }

    .secondary-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .secondary-filters .field {
      min-width: 138px;
    }

    .secondary-filters .field[data-filter="groupLead"] {
      min-width: 240px;
      width: min(270px, 100%);
    }

    .secondary-filters .field[data-filter="groupLead"] .filter-trigger {
      min-width: 0;
    }

    .secondary-filters .field[data-filter="deliveryStatus"] {
      min-width: 200px;
      width: min(220px, 100%);
    }

    .secondary-filters .field[data-filter="deliveryStatus"] .filter-trigger {
      min-width: 0;
    }

    .secondary-filters .filter-trigger {
      height: 34px;
      min-width: 138px;
      padding: 0 10px;
      border-radius: 9px;
      font-size: 13px;
      background: #e4e5e9;
    }

    .secondary-filters .field.open .filter-trigger {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
    }

    .secondary-filters .filter-dropdown {
      border-radius: 0 0 9px 9px;
    }

    .tabs {
      display: flex;
      gap: 26px;
      padding: 0 4px;
      border-bottom: 1px solid var(--line);
    }

    .tab-btn {
      appearance: none;
      border: 0;
      padding: 10px 0 11px;
      margin-bottom: -1px;
      background: transparent;
      color: #747988;
      font: 700 20px/1 "Segoe UI", Arial, sans-serif;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }

    .tab-btn.active {
      color: #1f2129;
      border-bottom-color: var(--accent);
    }

    .content {
      min-height: 0;
      display: grid;
      align-content: start;
      align-items: start;
    }

    .state-panel {
      border: 1px dashed var(--line);
      border-radius: var(--radius-l);
      background: #ececef;
      min-height: 480px;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: #8e95a4;
    }

    .empty-icon {
      width: 52px;
      height: 52px;
      border: 2px solid #c6cdd9;
      border-radius: 12px;
      margin: 0 auto 12px;
      position: relative;
    }

    .empty-icon::before,
    .empty-icon::after {
      content: "";
      position: absolute;
      border: 2px solid #c6cdd9;
      border-radius: 50%;
    }

    .empty-icon::before {
      width: 18px;
      height: 18px;
      right: -8px;
      bottom: -6px;
      background: #ececef;
    }

    .empty-icon::after {
      width: 7px;
      height: 2px;
      border: 0;
      background: #c6cdd9;
      transform: rotate(42deg);
      right: -10px;
      bottom: -3px;
    }

    .empty-title {
      margin: 0 0 8px;
      font-size: 24px;
      color: #8d95a6;
      font-weight: 700;
    }

    .empty-text {
      margin: 0;
      max-width: 480px;
      font-size: 16px;
      line-height: 1.35;
      color: #8f97a8;
    }

    .table-wrap {
      background: #efeff1;
      border: 1px solid var(--line);
      border-radius: var(--radius-l);
      overflow: auto;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
      align-self: start;
    }

    .table-sections {
      display: grid;
      gap: 12px;
      align-content: start;
      align-items: start;
    }

    .table-section {
      display: grid;
      gap: 8px;
      align-content: start;
      align-items: start;
    }

    .table-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-right: 4px;
    }

    .table-section-title {
      margin: 0;
      padding: 0 4px;
      color: #212936;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1640px;
    }

    th, td {
      text-align: left;
      padding: 10px 11px;
      border-bottom: 1px solid var(--line-strong);
      vertical-align: top;
    }

    th {
      color: #1f2a40;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    td {
      font-size: 14px;
      color: #2b2f39;
      background: rgba(244, 245, 247, 0.65);
    }

    tr:hover td { background: #f4f5f8; }
    tr:last-child td { border-bottom: 0; }

    .city-block strong {
      display: block;
      font-size: 14px;
      margin-bottom: 2px;
      font-weight: 600;
    }

    .city-block span {
      color: var(--muted);
      font-size: 13px;
    }

    .link {
      color: #1d4ede;
      text-underline-offset: 2px;
      cursor: pointer;
      text-decoration: underline;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 7px;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      white-space: nowrap;
      margin-bottom: 6px;
    }

    .badge.neutral { background: #e2e4ff; color: #676de2; }
    .badge.warn { background: #ffe5cb; color: #d97916; }
    .badge.danger { background: #ffd4d4; color: #dc3a3a; }
    .badge.info { background: #dce8ff; color: #2f72db; }

    .cell-content {
      display: inline-grid;
      gap: 3px;
    }

    .status-cell {
      max-width: 190px;
      justify-items: start;
    }

    .status-cell .badge {
      width: fit-content;
      margin-bottom: 0;
    }

    .status-track {
      display: grid;
      gap: 2px;
      max-width: 180px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .status-track-label {
      color: #70798c;
      font-weight: 600;
    }

    .status-track-value {
      color: #4d5567;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-color: rgba(77, 85, 103, 0.55);
    }

    .status-track-value:hover {
      color: #2f3a4f;
      text-decoration-color: rgba(47, 58, 79, 0.8);
    }

    .request-link {
      color: #1d4ede;
      text-underline-offset: 2px;
      cursor: pointer;
      text-decoration: underline;
      font-weight: 600;
    }

    .transfer-btn {
      height: 30px;
      border: 0;
      border-radius: 8px;
      width: 176px;
      padding: 0 12px;
      background: #1f2129;
      color: #fff;
      font: 700 12px/1 "Segoe UI", Arial, sans-serif;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      white-space: nowrap;
    }

    .transfer-btn:hover { filter: brightness(0.98); }
    .transfer-btn:active { transform: translateY(1px); }

    .address-cell {
      display: inline-grid;
      gap: 6px;
    }

    .delivery-badge {
      width: fit-content;
      margin: 0;
      padding: 2px 7px;
    }

    .delivery-home {
      background: #dce8ff;
      color: #2f72db;
    }

    .delivery-locker {
      background: #e2e4ff;
      color: #676de2;
    }

    .delivery-lc {
      background: #ffe5cb;
      color: #b7680e;
    }

    .contact-cell {
      gap: 2px;
    }

    .contact-phone {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .stock-cell {
      display: inline-grid;
      gap: 4px;
    }

    .details-row td {
      padding: 0;
      background: #f2f3f6;
      border-bottom: 1px solid var(--line-strong);
    }

    .details-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px dashed #c8ccd6;
    }

    .card-codes {
      border: 1px solid #cfd3dc;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
      width: 92px;
    }

    .card-code {
      display: block;
      padding: 5px 8px;
      font-size: 12px;
      color: #252a35;
      border-bottom: 1px solid #e6e9ef;
      line-height: 1.15;
    }

    .card-code:last-child {
      border-bottom: 0;
    }

    .card-counts {
      display: grid;
      gap: 4px;
      max-width: 220px;
      margin-top: 6px;
    }

    .card-count-line {
      display: block;
      border: 1px solid #d5d9e1;
      border-radius: 7px;
      background: #fff;
      padding: 4px 8px;
      color: #2a303c;
      font-size: 12px;
      line-height: 1.2;
    }

    .map-layout {
      min-height: 540px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 10px;
    }

    .map-canvas {
      border: 1px solid var(--line);
      border-radius: var(--radius-l);
      background:
        linear-gradient(115deg, rgba(138, 146, 162, 0.2) 2px, transparent 0) 0 0/58px 58px,
        linear-gradient(205deg, rgba(138, 146, 162, 0.18) 2px, transparent 0) 0 0/82px 82px,
        #e9eaee;
      position: relative;
      overflow: hidden;
    }

    .map-canvas::before,
    .map-canvas::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(103, 121, 151, 0.17);
      pointer-events: none;
    }

    .map-canvas::before {
      width: 460px;
      height: 62px;
      top: 18%;
      left: -20%;
      transform: rotate(-10deg);
    }

    .map-canvas::after {
      width: 480px;
      height: 64px;
      bottom: 16%;
      right: -17%;
      transform: rotate(12deg);
    }

    .map-pin {
      position: absolute;
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      background: var(--accent);
      box-shadow: 0 8px 14px rgba(218, 60, 52, 0.25);
      cursor: pointer;
    }

    .map-pin::after {
      content: "";
      position: absolute;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #fff;
      top: 8px;
      left: 8px;
    }

    .map-pin.selected { background: #1f2129; }
    .map-pin.selected::after { background: #e9e9ed; }

    .map-list {
      border: 1px solid var(--line);
      border-radius: var(--radius-l);
      background: #f0f1f4;
      overflow: auto;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .map-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f6f6f8;
      padding: 9px 10px;
      cursor: pointer;
    }

    .map-item.active {
      border-color: #9ea4b3;
      background: #eceef3;
    }

    .map-item strong {
      display: block;
      font-size: 17px;
      margin-bottom: 2px;
    }

    .map-item span {
      display: block;
      color: var(--muted);
      font-size: 15px;
    }

    .inwork-list {
      display: grid;
      gap: 8px;
    }

    .inwork-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f3f4f7;
      padding: 10px 12px;
      display: grid;
      gap: 4px;
    }

    .inwork-item strong {
      font-size: 14px;
      color: #273044;
    }

    .inwork-item span {
      font-size: 12px;
      color: #646d7f;
      line-height: 1.35;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(12px);
      background: rgba(25, 29, 37, 0.95);
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 15px;
      box-shadow: 0 12px 24px rgba(20, 24, 33, 0.24);
      opacity: 0;
      pointer-events: none;
      transition: 0.16s ease;
    }

    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      clip-path: inset(50%);
      white-space: nowrap;
      border: 0;
      padding: 0;
      margin: -1px;
    }

    @media (max-width: 1500px) {
      .filter-trigger { font-size: 13px; }
      .tab-btn { font-size: 18px; }
      th { font-size: 11px; }
      td { font-size: 13px; }
      .city-block strong { font-size: 13px; }
      .city-block span { font-size: 12px; }
      .badge { font-size: 9px; }
      .empty-title { font-size: 20px; }
      .empty-text { font-size: 14px; }
    }

    @media (max-width: 1120px) {
      .topbar { flex-wrap: wrap; }
      .profile { width: 100%; justify-content: flex-end; }
      .primary-filters {
        grid-template-columns: 1fr;
      }
      .map-layout { grid-template-columns: 1fr; }
      .map-canvas { min-height: 360px; }
    }

    @media (max-width: 720px) {
      .app { padding: 8px; gap: 10px; }
      .profile-name { font-size: 13px; padding: 0 10px; }
      .title { font-size: 22px; }
      .tab-btn { font-size: 16px; }
      .state-panel { min-height: 380px; }
      .empty-text { font-size: 13px; }
      .secondary-filters .field[data-filter="groupLead"] { min-width: 138px; width: 100%; }
      .secondary-filters .field[data-filter="deliveryStatus"] { min-width: 138px; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1 class="title">Снабжение мобильных банкиров</h1>
      <div class="profile" aria-label="Профиль пользователя">
        <div class="profile-dot" title="Статус подключения"></div>
