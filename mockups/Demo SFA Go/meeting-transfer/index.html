<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="../../../favicon.svg">
  <title>Demo SFA Go - Перенос встречи</title>
  <style>
    :root {
      --bg: #eef2f7;
      --panel: #ffffff;
      --line: #d6deea;
      --text: #17314c;
      --muted: #6f7f94;
      --accent: #0d7c66;
      --shadow: 0 18px 36px rgba(23, 49, 76, 0.14);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(13, 124, 102, 0.12), transparent 24%),
        linear-gradient(180deg, #f7fafc 0%, var(--bg) 100%);
    }

    .app {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      background: rgba(255, 255, 255, 0.68);
    }

    .head {
      padding: 14px;
      border-bottom: 1px solid rgba(214, 222, 234, 0.9);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
    }

    .head-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .head-copy h1 {
      margin: 0 0 6px;
      font-size: 19px;
      line-height: 1.1;
    }

    .head-copy p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(13, 124, 102, 0.12);
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 12px 14px;
      font: 700 14px/1 "Segoe UI", Arial, sans-serif;
      cursor: pointer;
    }

    .btn-primary {
      background: #101a2b;
      color: #fff;
    }

    .btn-secondary {
      background: #edf2f7;
      color: var(--text);
    }

    .frame-wrap {
      padding: 12px;
    }

    .frame-shell {
      height: 100%;
      border: 1px solid rgba(214, 222, 234, 0.9);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 142px);
      min-height: 720px;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="head">
      <div class="head-top">
        <div class="head-copy">
          <h1>Перенос встречи</h1>
          <p>Flow вынесен в отдельную подпапку и открывается через общий Demo SFA Go shell.</p>
        </div>
        <span class="badge">Meeting Transfer</span>
      </div>
      <div class="actions">
        <button class="btn-secondary" type="button" data-flow="meetings">Ко встречам</button>
        <button class="btn-primary" type="button" data-flow="debit-card">К дебетовой карте</button>
      </div>
    </header>

    <div class="frame-wrap">
      <div class="frame-shell">
        <iframe src="../debit-card/index.html?flow=meeting-transfer" title="Перенос встречи"></iframe>
      </div>
    </div>
  </div>

  <script>
    function navigate(flow) {
      const payload = { type: "demo-sfa-go:navigate", flow };
      try { window.parent.postMessage(payload, "*"); } catch {}
      try { window.top.postMessage(payload, "*"); } catch {}
      if (window.parent === window) {
        const url = new URL("../index.html", location.href);
        url.searchParams.set("flow", flow);
        location.href = url.toString();
      }
    }

    document.querySelectorAll("[data-flow]").forEach((button) => {
      button.addEventListener("click", () => navigate(button.dataset.flow));
    });
  </script>
</body>
</html>
