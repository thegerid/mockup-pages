const smsModal=()=>st.modal?`<div class="modalbg"><div class="modal"><h3>Введите код из смс</h3><input id="sms" class="code" inputmode="numeric" maxlength="4" value="${st.sms}"><div class="mc">Код отправлен на +7 ••• •• 0410<br>Запросить повторно можно через 00:51</div></div></div>`:"";
const bindTabSwipe=()=>{const strip=app.querySelector(".tl");if(!strip||strip.dataset.swipeBound==="1")return;strip.dataset.swipeBound="1";let dragging=false,startX=0,startLeft=0,pointerId=null,startTabId="";strip.addEventListener("pointerdown",e=>{if(e.pointerType==="mouse"&&e.button!==0)return;dragging=true;startX=e.clientX;startLeft=strip.scrollLeft;startTabId=e.target.closest("[data-tab]")?.dataset.tab||"";tabDragMoved=false;pointerId=e.pointerId;strip.classList.add("dragging");if(strip.setPointerCapture)strip.setPointerCapture(pointerId)});strip.addEventListener("pointermove",e=>{if(!dragging||e.pointerId!==pointerId)return;const delta=e.clientX-startX;if(Math.abs(delta)>8)tabDragMoved=true;strip.scrollLeft=startLeft-delta});const stop=e=>{if(!dragging||e.pointerId!==pointerId)return;dragging=false;pointerId=null;strip.classList.remove("dragging");const tappedTab=!tabDragMoved?startTabId:"";startTabId="";if(tappedTab&&st.tab!==tappedTab){st.tab=tappedTab;st.exp=null;st.mapSel=null;render();return}setTimeout(()=>{tabDragMoved=false},0)};strip.addEventListener("pointerup",stop);strip.addEventListener("pointercancel",stop)};
const bindMapPan=()=>{const world=app.querySelector("[data-map-world]");if(!world||world.dataset.panBound==="1")return;world.dataset.panBound="1";let dragging=false,pid=null,sx=0,sy=0,startX=0,startY=0,moved=false;const apply=()=>{world.style.transform=mapWorldTransform()};world.addEventListener("pointerdown",e=>{if(e.pointerType==="mouse"&&e.button!==0)return;if(e.target.closest("[data-map-open],[data-book]"))return;dragging=true;pid=e.pointerId;sx=e.clientX;sy=e.clientY;startX=st.mapView.x;startY=st.mapView.y;moved=false;world.classList.add("dragging");if(world.setPointerCapture)world.setPointerCapture(pid)});world.addEventListener("pointermove",e=>{if(!dragging||e.pointerId!==pid)return;const dx=e.clientX-sx,dy=e.clientY-sy;if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;const p=clampMap(startX+dx,startY+dy,st.mapView.z);st.mapView.x=p.x;st.mapView.y=p.y;apply()});const stop=e=>{if(!dragging||e.pointerId!==pid)return;dragging=false;pid=null;world.classList.remove("dragging");if(moved&&st.mapSel!==null){st.mapSel=null;render()}};world.addEventListener("pointerup",stop);world.addEventListener("pointercancel",stop)};
const bindMapSheetSwipe=()=>{const bottom=app.querySelector("[data-map-bottom]");if(!bottom||bottom.dataset.swipeBound==="1")return;bottom.dataset.swipeBound="1";let tracking=false,pid=null,sx=0,sy=0;bottom.addEventListener("pointerdown",e=>{if(e.pointerType==="mouse"&&e.button!==0)return;tracking=true;pid=e.pointerId;sx=e.clientX;sy=e.clientY;if(bottom.setPointerCapture)bottom.setPointerCapture(pid)});const stop=e=>{if(!tracking||e.pointerId!==pid)return;tracking=false;pid=null};bottom.addEventListener("pointerup",e=>{if(!tracking||e.pointerId!==pid)return;const dx=e.clientX-sx,dy=e.clientY-sy;tracking=false;pid=null;if(dy<-56&&Math.abs(dy)>Math.abs(dx)+12){st.map=false;st.mapSel=null;render()}});bottom.addEventListener("pointercancel",stop)};
function render(){app.innerHTML=(st.scr==="list"?listScreen():st.scr==="product"?productScreen():st.scr==="sign"?signScreen():st.scr==="onboard"?onboardScreen():successScreen())+smsModal();if(st.scr==="list"){bindTabSwipe();if(st.map){bindMapPan();bindMapSheetSwipe()}}if(st.modal){const e=document.getElementById("sms");e.focus();e.setSelectionRange(e.value.length,e.value.length)}}
app.addEventListener("click",e=>{if(e.target.closest("[data-stop-open]")&&!e.target.closest("[data-unbook-confirm],[data-unbook-cancel],[data-unbook-open]"))return;const b=e.target.closest("[data-msg],[data-tab],[data-open],[data-close],[data-hide-note],[data-next],[data-back],[data-sms],[data-hide-banner],[data-upload],[data-finish],[data-home],[data-select-card],[data-pick-card],[data-agree-meeting],[data-start-meeting],[data-toggle-hints],[data-book],[data-unbook-open],[data-unbook-cancel],[data-unbook-confirm],[data-map-toggle],[data-radar-toggle],[data-map-open],[data-map-zoom]");if(!b)return;
if(b.dataset.msg)return say(b.dataset.msg);
if(b.dataset.mapToggle){st.map=!st.map;if(!st.map)st.mapSel=null;return render()}
if(b.dataset.mapZoom){if(b.dataset.mapZoom==="reset"){st.mapView={x:0,y:0,z:.9};st.mapSel=null;return render()}const dz=b.dataset.mapZoom==="in"?0.12:-0.12;const z=Math.max(.75,Math.min(1.8,Number((st.mapView.z+dz).toFixed(2))));const p=clampMap(st.mapView.x,st.mapView.y,z);st.mapView={x:p.x,y:p.y,z};return render()}
if(b.dataset.radarToggle){st.radar=!st.radar;return render()}
if(b.dataset.mapOpen){const id=Number(b.dataset.mapOpen);st.mapSel=st.mapSel===id?null:id;return render()}
if(b.dataset.book){if(bookExchangeRequest(b.dataset.book)){st.mapSel=null;return render()}return}
if(b.dataset.unbookOpen){st.unbook={id:Number(b.dataset.unbookOpen),reason:""};return render()}
if(b.dataset.unbookCancel){if(st.unbook.id===Number(b.dataset.unbookCancel))st.unbook={id:null,reason:""};return render()}
if(b.dataset.unbookConfirm){const id=Number(b.dataset.unbookConfirm);if(st.unbook.id!==id||!st.unbook.reason)return;const idx=visits.findIndex(v=>v.id===id);if(idx>=0)visits.splice(idx,1);if(st.exp===id)st.exp=null;st.unbook={id:null,reason:""};say("Бронь снята");return render()}
if(b.dataset.toggleHints){st.hints=!st.hints;return render()}
if(b.dataset.tab){if(tabDragMoved)return;st.tab=b.dataset.tab;st.exp=null;st.mapSel=null;return render()}
if(b.dataset.open){st.exp=+b.dataset.open;st.sel=st.exp;return render()}
if("close"in b.dataset){st.exp=null;return render()}
if("hideNote"in b.dataset){st.notice=false;return render()}
if(b.dataset.agreeMeeting){st.meet[Number(b.dataset.agreeMeeting)]=true;return render()}
if(b.dataset.startMeeting){st.cs="";st.sc="";st.scr="product";return render()}
if(b.dataset.next){if(b.dataset.next==="product"){st.cs="";st.sc=""}st.scr=b.dataset.next;return render()}
if(b.dataset.pickCard){st.sc=b.dataset.pickCard;const box=document.getElementById("productResults");if(box)box.innerHTML=productResults();return}
if(b.dataset.selectCard){st.sc=b.dataset.selectCard;st.scr="sign";return render()}
if(b.dataset.back){st.scr=b.dataset.back;if(st.scr==="list")st.exp=st.sel;return render()}
if("sms"in b.dataset){st.modal=true;st.sms="";return render()}
if("hideBanner"in b.dataset){st.banner=false;return render()}
if("upload"in b.dataset)return photo.click();
if("finish"in b.dataset){st.scr="success";return render()}
if("home"in b.dataset){st.scr="list";st.tab="done";st.exp=null;return render()}
});
app.addEventListener("input",e=>{
if(e.target.id==="q"){const pos=e.target.selectionStart??e.target.value.length;st.q=e.target.value;st.exp=null;st.mapSel=null;render();const q=document.getElementById("q");if(q){q.focus();q.setSelectionRange(pos,pos)}return}
if(e.target.id==="cs"){st.cs=e.target.value;st.sc="";const box=document.getElementById("productResults");if(box)box.innerHTML=productResults();return}
if(e.target.id==="sms"){st.sms=e.target.value.replace(/\D/g,"").slice(0,4);e.target.value=st.sms;if(st.sms.length===4)setTimeout(()=>{st.modal=false;st.scr="onboard";render()},250)}
});
app.addEventListener("change",e=>{
if(e.target.dataset.unbookReason){const id=Number(e.target.dataset.unbookReason);if(st.unbook.id===id){st.unbook.reason=e.target.value;return render()}}
if(e.target.id==="exProduct"){st.exFilters.product=e.target.value;st.mapSel=null;return render()}
if(e.target.id==="exType"){st.exFilters.type=e.target.value;st.mapSel=null;return render()}
if(e.target.id==="exInterval"){st.exFilters.interval=e.target.value;st.mapSel=null;return render()}
});
photo.addEventListener("change",()=>{const f=photo.files&&photo.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{st.photo=String(r.result||"");st.banner=true;render()};r.readAsDataURL(f)});
setInterval(()=>{const moved=moveExpiredTplus();if(moved){if(st.scr==="list")render();return}refreshTimerBadges()},1000);
render();
</script>
<script src="../_shared/feedback-widget.js"></script>
</body>
</html>
