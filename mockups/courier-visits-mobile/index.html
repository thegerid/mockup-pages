<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Визиты курьера</title>
    <style>
      :root {
        --bg: #eef1f5;
        --panel: #ffffff;
        --text: #22324b;
        --muted: #7e8798;
        --line: #e6e8ee;
        --shadow: 0 8px 24px rgba(32, 42, 61, 0.12);
        --dark: #232429;
        --green: #2dbf72;
        --green-soft: #dff7e9;
        --red: #ff5b5b;
        --red-soft: #ffe3e3;
        --blue: #2f7cf6;
        --blue-soft: #dfebff;
        --violet: #7b5cff;
        --violet-soft: #ece5ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: start center;
        background:
          radial-gradient(circle at top left, rgba(47, 124, 246, 0.1), transparent 28%),
          linear-gradient(180deg, #f7f8fb 0%, var(--bg) 100%);
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
      }

      .phone {
        width: min(391px, 100%);
        min-height: 100vh;
        background: linear-gradient(180deg, #f7f8fa 0%, #eef1f5 100%);
        border-left: 1px solid #dde2ea;
        border-right: 1px solid #dde2ea;
      }

      .header {
        position: sticky;
        top: 0;
        z-index: 3;
        padding: 10px 14px 12px;
        background: rgba(247, 248, 250, 0.92);
        backdrop-filter: blur(14px);
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 14px;
      }

      .tool-left,
      .tool-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .icon-button {
        width: 38px;
        height: 38px;
        border: 0;
        border-radius: 10px;
        display: grid;
        place-items: center;
        background: var(--panel);
        box-shadow: 0 5px 12px rgba(38, 47, 62, 0.08);
        cursor: pointer;
      }

      .icon-button svg {
        width: 18px;
        height: 18px;
        fill: #262b34;
      }

      .status-ring::before {
        content: "";
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 4px solid var(--green);
        display: block;
      }

      .search {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        background: #f0f2f6;
        border-radius: 12px;
        color: var(--muted);
      }

      .search svg {
        width: 18px;
        height: 18px;
        fill: #848c99;
        flex: 0 0 auto;
      }

      .search input {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        font: inherit;
        color: var(--text);
      }

      .search input::placeholder {
        color: #8a91a0;
      }

      .tabs {
        display: flex;
        gap: 8px;
        padding: 0 12px;
        margin: 0 0 12px;
      }

      .edit-tab {
        width: 34px;
        border: 0;
        border-radius: 10px;
        background: var(--panel);
        box-shadow: 0 4px 10px rgba(38, 47, 62, 0.08);
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .edit-tab svg {
        width: 15px;
        height: 15px;
        fill: #2a2f38;
      }

      .tab-list {
        display: flex;
        gap: 6px;
        overflow: auto;
        scrollbar-width: none;
      }

      .tab-list::-webkit-scrollbar {
        display: none;
      }

      .tab {
        border: 0;
        border-radius: 10px;
        padding: 11px 14px;
        background: #e9ecf1;
        color: #353942;
        white-space: nowrap;
        font-size: 14px;
        cursor: pointer;
      }

      .tab.active {
        background: var(--dark);
        color: #ffffff;
      }

      .content {
        padding: 0 10px 28px;
      }

      .list {
        display: grid;
        gap: 12px;
      }

      .card {
        background: var(--panel);
        border-radius: 6px;
        padding: 14px 16px 16px;
        box-shadow: var(--shadow);
        transition: 160ms ease;
      }

      .card.is-clickable {
        cursor: pointer;
      }

      .card.is-clickable:hover {
        transform: translateY(-1px);
      }

      .card.expanded {
        padding: 14px 8px 12px;
        border: 1px solid #d4d8e0;
      }

      .card-topline {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .topline-right {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .icon-copy {
        width: 18px;
        height: 18px;
        display: inline-grid;
        place-items: center;
        color: #8f9198;
        font-size: 18px;
      }

      .close-button {
        width: 32px;
        height: 32px;
        border: 0;
        border-radius: 50%;
        background: #e7e9ee;
        color: #2a2e35;
        font-size: 24px;
        line-height: 1;
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .labels {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
      }

      .badge {
        padding: 3px 8px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
        line-height: 1;
      }

      .badge.cc2,
      .badge.repeat {
        background: var(--red-soft);
        color: var(--red);
      }

      .badge.trip,
      .badge.client,
      .badge.new {
        background: var(--green-soft);
        color: #19a559;
      }

      .badge.dc {
        background: var(--violet-soft);
        color: var(--violet);
      }

      .badge.assigned,
      .badge.card {
        background: var(--blue-soft);
        color: var(--blue);
      }

      .badge.gray {
        background: #f0f2f6;
        color: #9097a3;
      }

      .name {
        margin: 0 0 14px;
        font-size: 18px;
        font-weight: 800;
        line-height: 1.3;
      }

      .client-code {
        margin: -4px 0 14px;
        color: #8f95a3;
        font-size: 14px;
      }

      .detail {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        margin-bottom: 12px;
        color: #2d3340;
      }

      .detail svg {
        width: 18px;
        height: 18px;
        fill: #292d35;
        flex: 0 0 auto;
        margin-top: 1px;
      }

      .detail-text {
        line-height: 1.35;
      }

      .detail-text small {
        display: block;
        margin-top: 4px;
        color: #9198a5;
        font-size: 13px;
      }

      .comment-link {
        display: inline-flex;
        align-items: center;
        color: #3a3e46;
        text-decoration: underline;
        text-underline-offset: 2px;
        cursor: pointer;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 6px;
        flex-wrap: wrap;
      }

      .action {
        min-width: 74px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1.5px solid #2f3239;
        background: #ffffff;
        color: #2f3239;
        font-weight: 500;
        font-size: 14px;
        cursor: pointer;
      }

      .action.primary {
        background: var(--dark);
        color: #ffffff;
        border-color: var(--dark);
        font-weight: 700;
      }

      .section-title {
        margin: 18px 0 12px;
        font-size: 18px;
        font-weight: 800;
      }

      .section-text {
        margin: 0 0 8px;
        font-size: 16px;
        line-height: 1.35;
      }

      .product-card {
        margin-top: 10px;
        padding: 12px 14px 14px;
        background: #ffffff;
        border-radius: 18px;
        box-shadow: 0 10px 24px rgba(32, 42, 61, 0.14);
      }

      .product-body {
        display: grid;
        grid-template-columns: 90px 1fr;
        gap: 12px;
        align-items: center;
        margin-bottom: 14px;
      }

      .product-thumb {
        width: 90px;
        height: 56px;
        border-radius: 8px;
        background: linear-gradient(135deg, #e8eaef, #d8dce4);
      }

      .product-title {
        margin: 0 0 4px;
        font-size: 16px;
        font-weight: 800;
      }

      .product-subtitle {
        margin: 0;
        color: #959aa5;
        font-size: 15px;
      }

      .product-actions,
      .stack-actions {
        display: grid;
        gap: 12px;
      }

      .product-btn,
      .stack-btn {
        width: 100%;
        border-radius: 16px;
        padding: 14px 16px;
        font-size: 16px;
        line-height: 1.15;
        cursor: pointer;
      }

      .product-btn {
        border: 1.5px solid #2b2e35;
        background: #ffffff;
        color: #2b2e35;
        font-weight: 600;
      }

      .product-btn.primary {
        background: var(--dark);
        color: #ffffff;
        border-color: var(--dark);
        font-weight: 800;
      }

      .stack-actions {
        margin-top: 18px;
      }

      .stack-btn {
        border: 1.5px solid #373a40;
        background: #ffffff;
        color: #2a2d34;
        font-weight: 500;
      }

      .stack-btn.disabled {
        border-color: transparent;
        background: #e8ebf1;
        color: #b0b5c1;
        cursor: default;
      }

      .action:active,
      .close-button:active,
      .product-btn:active,
      .stack-btn:active,
      .tab:active,
      .icon-button:active,
      .edit-tab:active {
        transform: translateY(1px);
      }

      .empty {
        padding: 28px 18px;
        text-align: center;
        color: var(--muted);
        background: var(--panel);
        border-radius: 12px;
        box-shadow: var(--shadow);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%) translateY(12px);
        min-width: 260px;
        max-width: calc(100vw - 32px);
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(35, 36, 41, 0.95);
        color: #ffffff;
        font-size: 14px;
        line-height: 1.35;
        box-shadow: 0 16px 32px rgba(18, 21, 28, 0.24);
        opacity: 0;
        pointer-events: none;
        transition: 160ms ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="phone">
      <header class="header">
        <div class="toolbar">
          <div class="tool-left">
            <button class="icon-button" type="button" data-toast="Меню действий можно раскрыть отдельным экраном.">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
            </button>
          </div>
          <div class="tool-right">
            <button class="icon-button" type="button" data-toast="Гео-режим пока в демо-сценарии.">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a7 7 0 0 0-7 7c0 4.9 7 13 7 13s7-8.1 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5z"/></svg>
            </button>
            <button class="icon-button" type="button" data-toast="Комментарии можно вынести в отдельный чат или bottom sheet.">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h10a5 5 0 0 1 0 10H8l-4 4V5zm11-2h1a4 4 0 0 1 4 4v8l-3-3h-2a4 4 0 0 0 0-8h-1V3z"/></svg>
            </button>
            <button class="icon-button" type="button" data-toast="Кнопка звонка в шапке может открывать быстрый набор.">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8a15.5 15.5 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.24c1.1.36 2.3.56 3.6.56a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1C10.3 21 3 13.7 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.3.2 2.5.56 3.6a1 1 0 0 1-.24 1l-2.22 2.2z"/></svg>
            </button>
            <button class="icon-button status-ring" type="button" data-toast="Индикатор доступности курьера можно связать со статусом онлайн."></button>
          </div>
        </div>
        <label class="search">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 4a6 6 0 1 0 3.87 10.58l4.27 4.27 1.41-1.41-4.27-4.27A6 6 0 0 0 10 4zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"/></svg>
          <input id="searchInput" type="search" placeholder="Поиск по номеру или имени, или адресу" />
        </label>
      </header>

      <section class="tabs">
        <button class="edit-tab" type="button" data-toast="Эта кнопка может открывать режим массового редактирования.">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 17.25V21h3.75L17.8 9.94l-3.75-3.75L3 17.25zm14.71-9.04a1 1 0 0 0 0-1.42l-2.5-2.5a1 1 0 0 0-1.42 0l-1.17 1.17 3.75 3.75 1.34-1z"/></svg>
        </button>
        <div class="tab-list" id="tabList"></div>
      </section>

      <main class="content">
        <div class="list" id="cardList"></div>
      </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const tabs = [
        { id: "active", label: "Активные 25" },
        { id: "approved", label: "Согласованные 1" },
        { id: "done", label: "Завершенные 13" }
      ];

      const cards = [
        {
          id: 1,
          status: "active",
          labels: [
            ["cc2", "CC2"],
            ["trip", "ВЫЕХАЛ"]
          ],
          name: "Ковалёв Руслан Рубенович",
          time: "08:00 — 09:00",
          address: "Москва, Академика Королева, 11",
          metro: "метро Останкино",
          clientId: "70002858870",
          extension: ". 911",
          commentsLabel: "Комментарии (1)",
          commentsMeta: "1 основной",
          documents: ["Паспорт РФ"],
          productLabels: [
            ["cc2", "CC2"],
            ["assigned", "В РАБОТЕ"]
          ],
          productTitle: "Вторичное предложение",
          productSubtitle: "Выберите карту"
        },
        {
          id: 2,
          status: "active",
          labels: [
            ["client", "CC1"],
            ["client", "У КЛИЕНТА"],
            ["new", "НОВЫЙ"],
            ["gray", "ПЭП"],
            ["repeat", "ПОВТОРНАЯ: 2"]
          ],
          name: "Никифоров Фома Осипович",
          time: "11:00 — 12:00",
          address: "Неглинная улица, 9, Москва",
          metro: "метро Кузнецкий Мост",
          clientId: "70002858911",
          extension: ". 204",
          commentsLabel: "Комментарии (2)",
          commentsMeta: "1 основной, 1 технический",
          documents: ["Паспорт РФ", "Подписанное согласие"],
          productLabels: [
            ["cc2", "CC1"],
            ["assigned", "В РАБОТЕ"]
          ],
          productTitle: "Основное предложение",
          productSubtitle: "Показать подходящий продукт"
        },
        {
          id: 3,
          status: "approved",
          labels: [
            ["dc", "DC"],
            ["assigned", "НАЗНАЧЕНА"],
            ["repeat", "TO"],
            ["card", "+ МИР ALFACARD"],
            ["card", "+ ДЕТСКАЯ КАРТА"],
            ["card", "+ МИР ALFACARD"],
            ["card", "+ МИР ALFACARD"],
            ["card", "+ МИР ALFACARD"],
            ["card", "+ ДЕТСКАЯ КАРТА"],
            ["card", "+ МИР ALFACARD"]
          ],
          name: "Ефремов Эмтеобчж Ыцжэтт",
          time: "11:00 — 12:00",
          address: "Подтвержденный адрес клиента",
          metro: "точка встречи согласована",
          clientId: "70002859044",
          extension: ". 304",
          commentsLabel: "Комментарии (1)",
          commentsMeta: "назначение подтверждено",
          documents: ["Паспорт РФ", "Заявление на выпуск карты"],
          productLabels: [
            ["dc", "DC"],
            ["assigned", "НАЗНАЧЕНА"]
          ],
          productTitle: "Комплект карт",
          productSubtitle: "Выберите продукт для выдачи"
        },
        {
          id: 4,
          status: "done",
          labels: [
            ["gray", "CC3"],
            ["assigned", "ЗАВЕРШЕН"]
          ],
          name: "Сергеев Данил Алексеевич",
          time: "14:00 — 15:00",
          address: "Ленинградский проспект, 35",
          metro: "встреча завершена",
          clientId: "70002859128",
          extension: ". 501",
          commentsLabel: "Комментарии (1)",
          commentsMeta: "встреча закрыта",
          documents: ["Паспорт РФ"],
          productLabels: [
            ["gray", "CC3"],
            ["assigned", "ЗАВЕРШЕН"]
          ],
          productTitle: "Выдача завершена",
          productSubtitle: "Продукт уже передан"
        }
      ];

      const tabList = document.getElementById("tabList");
      const cardList = document.getElementById("cardList");
      const searchInput = document.getElementById("searchInput");
      const toast = document.getElementById("toast");

      let currentTab = "active";
      let expandedCardId = null;

      function showToast(text) {
        toast.textContent = text;
        toast.classList.add("show");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => {
          toast.classList.remove("show");
        }, 1800);
      }

      function renderTabs() {
        tabList.innerHTML = tabs
          .map((tab) => `<button class="tab ${tab.id === currentTab ? "active" : ""}" data-tab="${tab.id}" type="button">${tab.label}</button>`)
          .join("");

        tabList.querySelectorAll(".tab").forEach((button) => {
          button.addEventListener("click", () => {
            currentTab = button.dataset.tab;
            expandedCardId = null;
            renderTabs();
            renderCards();
          });
        });
      }

      function getFilteredCards() {
        const query = searchInput.value.trim().toLowerCase();
        return cards.filter((card) => {
          const byTab = card.status === currentTab;
          const haystack = `${card.name} ${card.address} ${card.time}`.toLowerCase();
          const bySearch = !query || haystack.includes(query);
          return byTab && bySearch;
        });
      }

      function cardActions(name) {
        return `
          <div class="actions">
            <button class="action primary" type="button" data-action="call" data-name="${name}">Позвонить</button>
            <button class="action" type="button" data-action="sms" data-name="${name}">SMS</button>
            <button class="action" type="button" data-action="note" data-name="${name}">Заметка</button>
          </div>
        `;
      }

      function renderExpandedCard(card, labels) {
        const productLabels = (card.productLabels || [])
          .map(([kind, text]) => `<span class="badge ${kind}">${text}</span>`)
          .join("");

        const documents = (card.documents || [])
          .map((item) => `<p class="section-text">${item}</p>`)
          .join("");

        return `
          <article class="card expanded" data-card-id="${card.id}">
            <div class="card-topline">
              <div class="labels">${labels}</div>
              <div class="topline-right">
                <span class="icon-copy" aria-hidden="true">⧉</span>
                <button class="close-button" type="button" data-close-card="${card.id}" aria-label="Закрыть">×</button>
              </div>
            </div>
            <h2 class="name">${card.name}</h2>
            <p class="client-code">${card.clientId}</p>
            <div class="detail">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 1.75A10.25 10.25 0 1 0 22.25 12 10.26 10.26 0 0 0 12 1.75zm1 10.66V6.5h-2v6.75l4.72 2.83 1-1.66z"/></svg>
              <div class="detail-text">${card.time}</div>
            </div>
            <div class="detail">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.2 21.45 3l-7.2 18-2.95-6.84L3 11.2zm8.13 1.84 1.85 4.29L17.5 6.01z"/></svg>
              <div class="detail-text">${card.address}<small>${card.metro}</small></div>
            </div>
            <div class="detail">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a9 9 0 0 0-9 9c0 3.06 1.52 5.77 3.84 7.4V22l3.32-1.77c.59.15 1.2.23 1.84.23 4.97 0 9-4.03 9-9s-4.03-9-9-9zm-3.2 9.6h6.4v1.8H8.8zm0-3.4h6.4V10H8.8zm0 6.8h4.2v1.8H8.8z"/></svg>
              <div class="detail-text"><span class="comment-link" data-comment="${card.id}">${card.commentsLabel}</span><small>${card.commentsMeta}</small></div>
            </div>
            ${cardActions(card.name)}
            <div class="actions">
              <button class="action" type="button" data-action="extension" data-name="${card.name}">${card.extension}</button>
            </div>
            <h3 class="section-title">Документы клиента</h3>
            ${documents}
            <h3 class="section-title">Что отдать</h3>
            <section class="product-card">
              <div class="labels">${productLabels}</div>
              <div class="product-body">
                <div class="product-thumb"></div>
                <div>
                  <h4 class="product-title">${card.productTitle}</h4>
                  <p class="product-subtitle">${card.productSubtitle}</p>
                </div>
              </div>
              <div class="product-actions">
                <button class="product-btn" type="button" data-product-info="${card.id}">Информация о продукте</button>
                <button class="product-btn primary" type="button" data-product-select="${card.id}">Выбрать карту</button>
              </div>
            </section>
            <div class="stack-actions">
              <button class="stack-btn disabled" type="button" disabled>Начать встречу</button>
              <button class="stack-btn" type="button" data-stack-action="unreachable" data-name="${card.name}">Не дозвонился</button>
              <button class="stack-btn" type="button" data-stack-action="reschedule" data-name="${card.name}">Перенести встречу</button>
              <button class="stack-btn" type="button" data-stack-action="reject" data-name="${card.name}">Отказ от продукта</button>
            </div>
          </article>
        `;
      }

      function renderCollapsedCard(card, labels) {
        return `
          <article class="card is-clickable" data-card-id="${card.id}">
            <div class="labels">${labels}</div>
            <h2 class="name">${card.name}</h2>
            <div class="detail">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 1.75A10.25 10.25 0 1 0 22.25 12 10.26 10.26 0 0 0 12 1.75zm1 10.66V6.5h-2v6.75l4.72 2.83 1-1.66z"/></svg>
              <div class="detail-text">${card.time}</div>
            </div>
            <div class="detail">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.2 21.45 3l-7.2 18-2.95-6.84L3 11.2zm8.13 1.84 1.85 4.29L17.5 6.01z"/></svg>
              <div class="detail-text">${card.address}<small>${card.metro}</small></div>
            </div>
            ${cardActions(card.name)}
          </article>
        `;
      }

      function bindCardEvents() {
        cardList.querySelectorAll("[data-card-id]").forEach((card) => {
          card.addEventListener("click", (event) => {
            if (event.target.closest("button")) {
              return;
            }
            expandedCardId = Number(card.dataset.cardId);
            renderCards();
          });
        });

        cardList.querySelectorAll("[data-close-card]").forEach((button) => {
          button.addEventListener("click", () => {
            expandedCardId = null;
            renderCards();
          });
        });

        cardList.querySelectorAll(".action").forEach((button) => {
          button.addEventListener("click", () => {
            const action = button.dataset.action;
            const name = button.dataset.name;
            const messages = {
              call: `Звонок: можно открыть системный dialer или карточку контакта для ${name}.`,
              sms: `SMS: можно показать шаблоны сообщений и быстрые действия для ${name}.`,
              note: `Заметка: можно открыть bottom sheet с историей комментариев для ${name}.`,
              extension: `Добавочный номер: можно быстро скопировать или набрать добавочный для ${name}.`
            };
            showToast(messages[action]);
          });
        });

        cardList.querySelectorAll("[data-comment]").forEach((button) => {
          button.addEventListener("click", () => {
            showToast("Комментарии можно открыть отдельным списком с историей изменений и пометками.");
          });
        });

        cardList.querySelectorAll("[data-product-info]").forEach((button) => {
          button.addEventListener("click", () => {
            showToast("Информация о продукте может открывать карточку с условиями, тарифом и PDF.");
          });
        });

        cardList.querySelectorAll("[data-product-select]").forEach((button) => {
          button.addEventListener("click", () => {
            showToast("Здесь можно переходить к выбору конкретной карты или сценарию выдачи.");
          });
        });

        cardList.querySelectorAll("[data-stack-action]").forEach((button) => {
          button.addEventListener("click", () => {
            const action = button.dataset.stackAction;
            const name = button.dataset.name;
            const messages = {
              unreachable: `Для ${name} можно открыть сценарий "не дозвонился" с повторным звонком и шаблоном SMS.`,
              reschedule: `Перенос встречи для ${name} может открывать календарь и выбор нового интервала.`,
              reject: `Отказ от продукта для ${name} можно оформить через форму причины отказа и завершение визита.`
            };
            showToast(messages[action]);
          });
        });
      }

      function renderCards() {
        const filtered = getFilteredCards();

        if (!filtered.length) {
          cardList.innerHTML = `<div class="empty">По текущему фильтру ничего не найдено. Здесь можно согласовать empty-state и следующий шаг пользователя.</div>`;
          return;
        }

        cardList.innerHTML = filtered
          .map((card) => {
            const labels = card.labels
              .map(([kind, text]) => `<span class="badge ${kind}">${text}</span>`)
              .join("");

            return card.id === expandedCardId ? renderExpandedCard(card, labels) : renderCollapsedCard(card, labels);
          })
          .join("");

        bindCardEvents();
      }

      searchInput.addEventListener("input", () => {
        expandedCardId = null;
        renderCards();
      });

      document.querySelectorAll("[data-toast]").forEach((button) => {
        button.addEventListener("click", () => {
          showToast(button.dataset.toast);
        });
      });

      renderTabs();
      renderCards();
    </script>
  </body>
</html>
