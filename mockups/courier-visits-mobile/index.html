<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Визиты курьера</title>
<style>
:root{--bg:#eef1f5;--w:#fff;--t:#1f3552;--m:#7f8798;--l:#e6e8ee;--d:#232429;--g:#2dbf72;--gs:#dff7e9;--r:#ff5b5b;--rs:#ffe3e3;--b:#2f7cf6;--bs:#dfebff;--v:#7b5cff;--vs:#ece5ff;--sh:0 10px 28px rgba(32,42,61,.12)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:start center;background:linear-gradient(180deg,#f7f8fb 0%,var(--bg) 100%);font:16px "Segoe UI",Arial,sans-serif;color:var(--t)}
.phone{width:min(391px,100%);min-height:100vh;background:linear-gradient(180deg,#f7f8fa 0%,#eef1f5 100%);border-inline:1px solid #dde2ea;position:relative;overflow:hidden}
.hdr{position:sticky;top:0;z-index:2;padding:10px 14px 12px;background:rgba(247,248,250,.92);backdrop-filter:blur(14px)}
.row,.sub{display:flex;align-items:center;justify-content:space-between;gap:10px}.row{margin-bottom:14px}.grp{display:flex;align-items:center;gap:10px}
.i,.n{width:38px;height:38px;border:0;border-radius:12px;background:var(--w);box-shadow:0 5px 12px rgba(38,47,62,.08);cursor:pointer}.ring:before{content:"";display:block;width:20px;height:20px;border-radius:50%;border:4px solid var(--g);margin:auto}
.i{font-size:18px}.s,.f{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#f0f2f6;border-radius:12px;color:var(--m)}.s input,.f input,.code{width:100%;border:0;outline:0;background:transparent;font:inherit;color:var(--t)}
.tabs{display:flex;gap:8px;padding:0 12px;margin:0 0 12px}.et{width:34px;border:0;border-radius:10px;background:var(--w);box-shadow:0 4px 10px rgba(38,47,62,.08);cursor:pointer}.tl{display:flex;gap:6px;overflow:auto;scrollbar-width:none}.tl::-webkit-scrollbar{display:none}.tab{border:0;border-radius:10px;padding:11px 14px;background:#e9ecf1;color:#353942;white-space:nowrap;cursor:pointer}.tab.a{background:var(--d);color:#fff}
.ct{padding:0 10px 28px}.list{display:grid;gap:12px}.card{background:var(--w);border-radius:6px;padding:14px 16px 16px;box-shadow:var(--sh)}.card.c{cursor:pointer}.card.x{padding:14px 12px 12px;border:1px solid #d4d8e0}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.rgt{display:flex;align-items:center;gap:8px}.xbtn{width:32px;height:32px;border:0;border-radius:50%;background:#e7e9ee;font-size:24px;cursor:pointer}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}.tag{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}.cc2,.rep,.alert{background:var(--rs);color:var(--r)}.trip,.cli,.new,.ok{background:var(--gs);color:#19a559}.dc{background:var(--vs);color:var(--v)}.asg,.prd,.work{background:var(--bs);color:var(--b)}.gry{background:#f0f2f6;color:#9097a3}
.nm{margin:0 0 8px;font-size:18px;font-weight:800;line-height:1.28}.codep{margin:0 0 14px;color:#8f95a3;font-size:14px}.d{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px;color:#2d3340}.ic{width:18px;flex:0 0 auto;text-align:center;font-weight:700}.dt{line-height:1.35}.dt small{display:block;margin-top:4px;color:#9198a5;font-size:13px}.ul{text-decoration:underline;text-underline-offset:2px}
.ibox{padding:12px 14px;border-radius:14px;border:1.5px solid #5e8fff;background:#eef4ff;color:#33435b;line-height:1.45;display:flex;justify-content:space-between;gap:10px;margin:8px 0 14px}.ia{display:flex;gap:10px;font-weight:700}.ibx{border:0;background:transparent;font:inherit;cursor:pointer}
.acts,.stack{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}.btn,.pbtn,.sbtn,.wide{border-radius:16px;font-size:16px;line-height:1.15;cursor:pointer}.btn{min-width:86px;padding:10px 12px;border:1.5px solid #2f3239;background:#fff;color:#2f3239}.btn.p{background:var(--d);color:#fff;border-color:var(--d);font-weight:700}
.sec{margin:18px 0 12px;font-size:18px;font-weight:800}.txt{margin:0 0 8px;font-size:16px;line-height:1.35}.pc{margin-top:10px;padding:12px 14px 14px;background:#fff;border-radius:18px;box-shadow:var(--sh)}
.pb,.rb,.uc{display:grid;grid-template-columns:90px 1fr;gap:12px;align-items:center}.thumb{width:90px;height:56px;border-radius:8px;background:#ff3b30;position:relative}.thumb:before{content:"A";position:absolute;top:8px;left:8px;font-size:11px;font-weight:700}.thumb:after{content:"МИР";position:absolute;right:10px;bottom:8px;font-size:11px;font-weight:700}.pt{margin:0 0 4px;font-size:16px;font-weight:800}.ps{margin:0;color:#959aa5;font-size:15px}
.pbtn,.sbtn,.wide{width:100%;padding:16px}.pbtn,.wide{border:0;background:var(--d);color:#fff;font-weight:800}.sbtn{border:1.5px solid #373a40;background:#fff;color:#2a2d34}.wide.dis{background:#e8ebf1;color:#b0b5c1;cursor:default}.stack{display:grid;gap:12px;margin-top:20px}
.page{padding:10px 16px 30px;background:#fff;min-height:100vh}.ph{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:30px}.ttl{flex:1}.ttl strong{display:block;font-size:20px;margin-bottom:2px}.ttl span{color:#738096;font-size:16px}.h1{margin:0 0 14px;font-size:22px;font-weight:800}.cp{margin:0 0 18px;color:#8a92a1;line-height:1.4}
.res{background:#fff;border-radius:4px;box-shadow:var(--sh);padding:14px;margin:20px 0 22px}.rb{grid-template-columns:92px 1fr auto;margin-bottom:14px}.rt{margin:0 0 4px;font-size:16px;font-weight:800}.rs{margin:0;color:#33435b}.rd{margin:0;color:#5e6675}
.sign p{margin:0 0 18px;line-height:1.45}.dash{display:inline-block;margin-bottom:30px;padding:4px 2px;border:1px dashed #ff9d9d;color:#505050}
.modalbg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:20px}.modal{width:min(280px,100%);background:#fff;border-radius:20px;padding:28px 22px;text-align:center}.modal h3{margin:0 0 20px;font-size:18px;font-weight:800}.code{width:132px;margin:0 auto 14px;padding:14px 16px;border:2px solid #9aa1ad;border-radius:10px;font-size:28px;text-align:center;letter-spacing:6px}.mc{color:#67738a;line-height:1.3}
.steps{margin:20px 0 28px;padding-left:18px;line-height:1.65}.up{display:grid;grid-template-columns:94px 1fr;gap:14px;align-items:center;background:#fff;border-radius:4px;box-shadow:var(--sh);padding:14px 16px;margin:24px 0 34px;cursor:pointer}.uth{width:94px;height:80px;border-radius:8px;border:1.5px solid #d7dce6;display:grid;place-items:center;background:#f9fbff;overflow:hidden;position:relative}.uth.ok{border:0;background:#101115}.uth img{width:100%;height:100%;object-fit:cover}.cam{font-size:26px;color:#8b95a7}.chk{position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.25)}.chk span,.nchk{width:26px;height:26px;border-radius:50%;background:#27c266;color:#fff;display:grid;place-items:center;font-weight:800}.ut{margin:0 0 2px;font-size:18px;font-weight:800}.us{margin:0;color:#1f3552}
.nt{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 16px;margin:-10px -16px 16px;border-bottom:1px solid #dfe3eb}.nl{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;color:#111}
.fin{min-height:100vh;background:#fff;padding:40px 14px 30px;display:flex;flex-direction:column}.emo{width:68px;height:68px;border-radius:20px;background:#f0f2f5;display:grid;place-items:center;margin:0 auto 18px;font-size:32px}.fin h1{margin:0 0 10px;text-align:center;font-size:22px}.fin p{margin:0 0 26px;text-align:center;color:#80889a}.chip{display:inline-block;margin-bottom:14px;padding:9px 18px;border-radius:999px;background:#232429;color:#fff;font-weight:700}.ban{display:flex;align-items:center;gap:12px;padding:14px;border:1.5px solid #31c865;border-radius:14px;background:#dff7e6}.ban strong{width:22px;height:22px;border-radius:50%;background:#27c266;color:#fff;display:grid;place-items:center}.sp{flex:1}
.i:active,.n:active,.et:active,.tab:active,.xbtn:active,.btn:active,.pbtn:active,.sbtn:active,.wide:active{transform:translateY(1px)}.vh{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(12px);min-width:260px;max-width:calc(100vw - 32px);padding:12px 14px;border-radius:12px;background:rgba(35,36,41,.95);color:#fff;box-shadow:0 16px 32px rgba(18,21,28,.24);opacity:0;pointer-events:none;transition:.16s}.toast.s{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="phone"><div id="app"></div><input id="photo" class="vh" type="file" accept="image/*"></div><div id="toast" class="toast"></div>
<script>
const tabs=[["active","Активные 25"],["approved","Согласованные 1"],["done","Завершенные 13"]];
const visits=[{id:1,status:"active",labels:[["asg","НАЗНАЧЕНА"]],name:"Королёв Глеб Антонович",code:"DC2010250557280",time:"20:00 — 21:00",phone:"+79059863745",address:"г Москва, Алтуфьевское шоссе, д 32",metro:"метро Дегунино",note:"Осторожно, злая собака",pl:[["dc","DCN"],["work","В РАБОТЕ"]],pt:"NH_MIR PUL AlfaCard Dual Daily",ps:"Карта не привязана",mask:"220015******3453"},{id:2,status:"active",labels:[["cc2","CC2"],["trip","ВЫЕХАЛ"]],name:"Ковалёв Руслан Рубенович",time:"08:00 — 09:00",address:"Москва, Академика Королева, 11",metro:"метро Останкино"},{id:3,status:"approved",labels:[["dc","DC"],["asg","НАЗНАЧЕНА"],["prd","+ МИР ALFACARD"]],name:"Ефремов Эмтеобчж Ыцжэтт",time:"11:00 — 12:00",address:"Подтвержденный адрес клиента",metro:"точка встречи согласована"},{id:4,status:"done",labels:[["gry","CC3"],["asg","ЗАВЕРШЕН"]],name:"Сергеев Данил Алексеевич",time:"14:00 — 15:00",address:"Ленинградский проспект, 35",metro:"встреча завершена"}];
const st={scr:"list",tab:"active",q:"",exp:null,sel:1,cs:"3453",sms:"",modal:false,photo:"",banner:true,notice:true};
const app=document.getElementById("app"),toast=document.getElementById("toast"),photo=document.getElementById("photo");
const cur=()=>visits.find(v=>v.id===st.sel)||visits[0];
const say=t=>{toast.textContent=t;toast.classList.add("s");clearTimeout(say.t);say.t=setTimeout(()=>toast.classList.remove("s"),1800)};
const tags=a=>a.map(([k,t])=>`<span class="tag ${k}">${t}</span>`).join("");
const base=()=>`<header class="hdr"><div class="row"><div class="grp"><button class="i" data-msg="Меню действий можно раскрыть отдельным экраном.">☰</button></div><div class="grp"><button class="i" data-msg="Комментарии можно вынести в отдельный чат или bottom sheet.">◔</button><button class="i" data-msg="Гео-режим можно связать с маршрутом курьера.">⌖</button><button class="i ring" data-msg="Индикатор доступности курьера можно связать со статусом онлайн."></button></div></div><label class="s"><span>⌕</span><input id="q" placeholder="Поиск по номеру или имени, или адресу" value="${st.q}"></label></header>`;
const tabbar=()=>`<section class="tabs"><button class="et" data-msg="Эта кнопка может открывать режим массового редактирования.">✎</button><div class="tl">${tabs.map(([id,l])=>`<button class="tab ${st.tab===id?"a":""}" data-tab="${id}">${l}</button>`).join("")}</div></section>`;
const list=()=>visits.filter(v=>v.status===st.tab&&(`${v.name} ${v.address||""} ${v.time||""}`.toLowerCase().includes(st.q.trim().toLowerCase())));
const collapsed=v=>`<article class="card c" data-open="${v.id}"><div class="tags">${tags(v.labels)}</div><h2 class="nm">${v.name}</h2><div class="d"><div class="ic">◔</div><div class="dt">${v.time}</div></div><div class="d"><div class="ic">➤</div><div class="dt">${v.address}<small>${v.metro}</small></div></div><div class="acts"><button class="btn p" data-msg="Звонок можно связать с системным dialer.">Позвонить</button><button class="btn" data-msg="SMS может открывать шаблоны сообщений.">SMS</button><button class="btn" data-msg="Заметка может открывать историю комментариев.">Заметка</button></div></article>`;
const expanded=v=>`<article class="card x"><div class="top"><div class="tags">${tags(v.labels)}</div><div class="rgt"><span>⧉</span><button class="xbtn" data-close>×</button></div></div><h2 class="nm">${v.name}</h2><p class="codep">${v.code}</p><div class="d"><div class="ic">◔</div><div class="dt">${v.time}</div></div><div class="d"><div class="ic">☎</div><div class="dt"><span class="ul">${v.phone}</span></div></div><div class="d"><div class="ic">➤</div><div class="dt">${v.address}<small>${v.metro}</small></div></div>${st.notice?`<div class="ibox"><div>Нажимайте кнопку «Выехал к клиенту»<br>за 60 мин до встречи</div><div class="ia"><span>i</span><button class="ibx" data-hide-note>×</button></div></div>`:""}<div class="d"><div class="ic">◍</div><div class="dt">${v.note}</div></div><div class="acts"><button class="btn" data-msg="SMS может открывать шаблоны сообщений.">SMS</button><button class="btn" data-msg="Заметка может открывать историю комментариев.">Заметка</button><button class="btn" data-msg="Добавочный номер можно копировать или набирать.">! 911</button></div><h3 class="sec">Что отдать</h3><section class="pc"><div class="tags">${tags(v.pl)}</div><div class="pb"><div class="thumb"></div><div><h4 class="pt">${v.pt}</h4><p class="ps">${v.ps}</p></div></div></section><div class="stack"><button class="pbtn" data-next="product">Согласовал встречу</button><button class="sbtn" data-msg="Можно открыть сценарий неуспешного контакта.">Не дозвонился</button><button class="sbtn" data-msg="Можно открыть перенос встречи с выбором нового интервала.">Перенести встречу</button><button class="sbtn" data-msg="Можно открыть форму отказа от продукта.">Отказ от продукта</button></div></article>`;
const listScreen=()=>`<section>${base()}${tabbar()}<main class="ct"><div class="list">${(list().length?list().map(v=>v.id===st.exp?expanded(v):collapsed(v)).join(""):`<div class="card">По текущему фильтру ничего не найдено.</div>`)}</div></main></section>`;
const head=back=>`<header class="ph"><button class="n" data-back="${back}">←</button><div class="ttl"><strong>У клиента</strong><span>${cur().name}</span></div><button class="n" data-msg="Дополнительные действия можно вынести в меню.">!</button></header>`;
const productScreen=()=>`<section class="page">${head("list")}<h1 class="h1">Выдача продукта</h1><p class="cp">Для выдачи продукта выберите карту из списка</p><label class="f"><span>⌕</span><input id="cs" value="${st.cs}" placeholder="3453"></label>${st.cs.includes("3453")?`<section class="res"><div class="rb"><div class="thumb"></div><div><h3 class="rt">NH-PUL MIR AlfaCard Dual Daily</h3><p class="rs">•• 3453</p></div><p class="rd">8/32</p></div><button class="pbtn" data-next="sign">Выдать продукт</button></section>`:`<section class="res">Ничего не найдено. Введите номер карты 3453.</section>`}<button class="sbtn" data-back="list">Назад</button></section>`;
const signScreen=()=>`<section class="page">${head("product")}<h1 class="h1">Фиксация факта проведения встречи по передачи карты.</h1><div class="sign"><p>Необходимо зафиксировать факт состоявшейся встречи через смс-код, который будет отправлен получателю карты, на номер, который указан у него в личном кабинете как основной.</p></div><div style="display:grid;gap:18px"><button class="pbtn" data-sms>Отправить код</button><button class="sbtn" data-back="product">Назад</button></div></section>`;
const onboardScreen=()=>`<section class="page">${head("sign")}${st.photo&&st.banner?`<div class="nt"><div class="nl"><span class="nchk">✓</span><span>Загрузка успешно завершена!</span></div><button class="ibx" style="font-size:28px" data-hide-banner>×</button></div>`:""}<h1 class="h1">Онбординг</h1><p class="cp">Уточните у клиента, нужна ли помощь с активацией карты.</p><p class="cp" style="color:#47617f;text-decoration:underline;text-underline-offset:3px">Активация карты:</p><ul class="steps"><li>Открыть приложение или мобильный банк «Альфа-Онлайн»</li><li>На главном экране выберите «Активация карты»</li><li>Введите номер карты</li><li>Выберите счёт для привязки карты</li><li>Подпишите заявление</li><li>Установите ПИН-код</li></ul><button class="up" data-upload><div class="uth ${st.photo?"ok":""}">${st.photo?`<img src="${st.photo}" alt="Фото"><div class="chk"><span>✓</span></div>`:`<span class="cam">⌘</span>`}</div><div style="text-align:left"><h3 class="ut">Клиент с welcome-pack</h3><p class="us">1 фото</p></div></button><button class="pbtn" data-finish>Завершить встречу</button></section>`;
const successScreen=()=>`<section class="fin"><div class="emo">◡</div><h1>Продукт выдан</h1><p>${cur().name}</p><span class="chip">Успех</span><div class="ban"><strong>✓</strong><div>Карта ${cur().mask} выдана клиенту</div></div><div class="sp"></div><button class="sbtn" data-home>Перейти ко всем встречам</button></section>`;
const smsModal=()=>st.modal?`<div class="modalbg"><div class="modal"><h3>Введите код из смс</h3><input id="sms" class="code" inputmode="numeric" maxlength="4" value="${st.sms}"><div class="mc">Код отправлен на +7 ••• •• 0410<br>Запросить повторно можно через 00:51</div></div></div>`:"";
function render(){app.innerHTML=(st.scr==="list"?listScreen():st.scr==="product"?productScreen():st.scr==="sign"?signScreen():st.scr==="onboard"?onboardScreen():successScreen())+smsModal();if(st.modal){const e=document.getElementById("sms");e.focus();e.setSelectionRange(e.value.length,e.value.length)}}
app.addEventListener("click",e=>{const b=e.target.closest("[data-msg],[data-tab],[data-open],[data-close],[data-hide-note],[data-next],[data-back],[data-sms],[data-hide-banner],[data-upload],[data-finish],[data-home]");if(!b)return;
if(b.dataset.msg)return say(b.dataset.msg);
if(b.dataset.tab){st.tab=b.dataset.tab;st.exp=null;return render()}
if(b.dataset.open){st.exp=+b.dataset.open;st.sel=st.exp;return render()}
if("close"in b.dataset){st.exp=null;return render()}
if("hideNote"in b.dataset){st.notice=false;return render()}
if(b.dataset.next){st.scr=b.dataset.next;return render()}
if(b.dataset.back){st.scr=b.dataset.back;if(st.scr==="list")st.exp=st.sel;return render()}
if("sms"in b.dataset){st.modal=true;st.sms="";return render()}
if("hideBanner"in b.dataset){st.banner=false;return render()}
if("upload"in b.dataset)return photo.click();
if("finish"in b.dataset){if(!st.photo)return say("Сначала загрузите фото.");st.scr="success";return render()}
if("home"in b.dataset){st.scr="list";st.tab="done";st.exp=null;return render()}
});
app.addEventListener("input",e=>{
if(e.target.id==="q"){st.q=e.target.value;st.exp=null;return render()}
if(e.target.id==="cs"){st.cs=e.target.value;return render()}
if(e.target.id==="sms"){st.sms=e.target.value.replace(/\D/g,"").slice(0,4);e.target.value=st.sms;if(st.sms.length===4)setTimeout(()=>{st.modal=false;st.scr="onboard";render()},250)}
});
photo.addEventListener("change",()=>{const f=photo.files&&photo.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{st.photo=String(r.result||"");st.banner=true;render()};r.readAsDataURL(f)});
render();
</script>
</body>
</html>
