<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
  <title>Биржа доставок — объединенный макет</title>
  <style>
    :root {
      --bg: #eef1f5;
      --panel: #ffffff;
      --line: #d9e1ec;
      --text: #1f3552;
      --muted: #6f7d91;
      --active: #151a22;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
    }
    .app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      background: var(--panel);
    }
    .head {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(8px);
    }
    .title {
      margin: 0 0 10px;
      font-size: 17px;
      font-weight: 800;
      line-height: 1.2;
    }
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      background: #e9edf3;
      color: #2f3a4b;
      font: 700 14px "Segoe UI", Arial, sans-serif;
      white-space: nowrap;
      cursor: pointer;
    }
    .tab.a {
      background: var(--active);
      color: #fff;
    }
    .frame-wrap {
      position: relative;
      min-height: 0;
    }
    .screen {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
      background: #fff;
    }
    .screen.a { display: block; }
  </style>
</head>
<body>
  <div class="app">
    <header class="head">
      <h1 class="title">Биржа доставок</h1>
      <div class="tabs">
        <button class="tab a" type="button" data-tab="settings">Настройки биржи</button>
        <button class="tab" type="button" data-tab="work">Работа с биржей в SFA Go</button>
      </div>
    </header>
    <main class="frame-wrap">
      <iframe class="screen a" data-screen="settings" src="./settings.html" title="Настройки биржи"></iframe>
      <iframe class="screen" data-screen="work" src="../work-with-exchange-sfa-go/index.html" title="Работа с биржей в SFA Go"></iframe>
    </main>
  </div>
  <script>
    const tabs = Array.from(document.querySelectorAll('[data-tab]'));
    const screens = Array.from(document.querySelectorAll('[data-screen]'));
    const defaultTab = "settings";
    function notifyTabChange(id) {
      const payload = { type: "mockup-tab-change", projectId: "delivery-exchange", tab: id };
      try { window.parent.postMessage(payload, "*"); } catch {}
      try { window.top.postMessage(payload, "*"); } catch {}
    }
    function setTabInUrl(id) {
      try {
        const url = new URL(location.href);
        url.searchParams.set("tab", id);
        history.replaceState(null, "", url.toString());
      } catch {}
    }
    function activate(id, options = {}) {
      const exists = tabs.some((t) => t.dataset.tab === id);
      const nextId = exists ? id : defaultTab;
      const shouldSyncUrl = options.syncUrl !== false;
      tabs.forEach((t) => t.classList.toggle('a', t.dataset.tab === nextId));
      screens.forEach((s) => s.classList.toggle('a', s.dataset.screen === nextId));
      if (shouldSyncUrl) setTabInUrl(nextId);
      notifyTabChange(nextId);
    }
    tabs.forEach((tab) => tab.addEventListener('click', () => activate(tab.dataset.tab)));
    const initialTab = new URL(location.href).searchParams.get("tab") || defaultTab;
    activate(initialTab, { syncUrl: true });
  </script>
<script src="../_shared/feedback-widget.js"></script>
</body>
</html>
